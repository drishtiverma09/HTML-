<!DOCTYPE html> 
<html> 
<head> 
<title>HTML Lists Example</title> 
</head> 
<body> 
<!-- Unordered List --> 
<h2>Unordered List</h2> 
<ul> 
<li>Apples</li> 
<li>Bananas</li> 
<li>Oranges</li> 
</ul> 
<!-- Ordered List --> 
<h2>Ordered List</h2> 
<ol> 
<li>Wake up</li> 
<li>Brush teeth</li> 
<li>Have breakfast</li> 
</ol> 
</body> 
</html>
